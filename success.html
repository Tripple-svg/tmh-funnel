<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Access Your Playbook</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #020617;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
  }

  .box {
    max-width: 500px;
    padding: 30px;
    background: #0f172a;
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(34, 197, 94, 0.2);
  }

  h1 {
    color: #22c55e;
  }

  .hidden {
    display: none;
  }

  .btn {
    margin-top: 20px;
    padding: 14px 24px;
    background: #22c55e;
    color: black;
    border-radius: 10px;
    font-weight: bold;
    text-decoration: none;
    display: inline-block;
  }

  .error {
    color: #ef4444;
  }

  .loader {
    opacity: 0.7;
    font-size: 14px;
  }
</style>

</head>

<body>

<div class="box">

    <!-- LOGO -->
  <div style="text-align:center; margin-bottom:20px;">
    <img src="logo.png.jpeg" alt="TMH Logo" style="width:60px; height:60px; border-radius:12px;">
    <p style="margin:8px 0 0; font-size:12px; opacity:0.7;">THE MARKETING HAVEN</p>
  </div>

  <h1 id="status">🔄 Verifying Payment...</h1>

  <p class="loader">Your payment has been confirmed!</p>

  <!-- SUCCESS -->
  <div id="successBox" class="hidden">
    <p>Your playbook is ready 👇</p>

    <a href="The Unseen Playbook.pdf" class="btn" download>
      DOWNLOAD NOW
    </a>
  </div>

  <!-- ERROR -->
  <div id="errorBox" class="hidden error">
    <p>❌ Payment not verified.</p>
    <p>Please complete payment first.</p>
  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const reference = params.get("ref");

if (reference) {
  document.getElementById("status").innerText = "✅ Payment Successful";
  document.getElementById("successBox").classList.remove("hidden");
} else {
  showError();
}

function showError() {
  document.getElementById("status").innerText = "Access Denied";
  document.getElementById("errorBox").classList.remove("hidden");
}

</script>

</body>
</html>
